<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спасибо за заявку — Главный Мастер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1E3A5F 0%, #F4A261 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .thankyou-card { background: white; max-width: 500px; margin: 20px; padding: 50px 40px; border-radius: 30px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .icon { font-size: 80px; margin-bottom: 20px; }
        h1 { color: #1E3A5F; margin-bottom: 15px; font-size: 2rem; }
        p { color: #666; margin-bottom: 20px; line-height: 1.6; }
        .phone { font-size: 1.5rem; font-weight: bold; margin: 20px 0; }
        .phone a { color: #F4A261; text-decoration: none; }
        .btn-home { background: #F4A261; color: #1E3A5F; padding: 14px 32px; border-radius: 40px; text-decoration: none; font-weight: 600; display: inline-block; margin-top: 20px; transition: all 0.3s; }
        .btn-home:hover { background: #E76F51; transform: scale(1.02); }
        .timer { margin-top: 25px; font-size: 0.9rem; color: #888; }
    </style>
</head>
<body>
    <div class="thankyou-card">
        <div class="icon">✅</div>
        <h1>Спасибо за заявку!</h1>
        <p>Наш мастер свяжется с вами <strong>в ближайшие 5 минут</strong>, чтобы уточнить детали и согласовать время выезда.</p>
        <div class="phone">
            <a href="tel:89334408969">📞 8 (933) 440-89-69</a><br>
            <a href="tel:89136408969">📞 8 (913) 640-89-69</a>
        </div>
        <p>Если нужна срочная консультация — позвоните сами.</p>
        <a href="index.html" class="btn-home">Вернуться на главную</a>
        <div class="timer">Через 5 секунд вы будете перенаправлены...</div>
    </div>
    <script>
        setTimeout(function() {
            window.location.href = "index.html";
        }, 5000);
    </script>
</body>
</html>
